name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # The hydraulics/hydrology engine is a pure netstandard2.0 library with no
  # Autodesk dependencies, so it builds and unit-tests on any runner without a
  # CAD install. This is the substantive numerical validation of the product.
  engine:
    name: Engine build & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            7.0.x

      - name: Restore & test engine
        run: dotnet test tests/HydroComplete.Engine.Tests/HydroComplete.Engine.Tests.csproj -c Release

  # The Civil 3D add-in cannot build its net8.0-windows target without the
  # Autodesk managed assemblies (AcMgd.dll etc.), which GitHub-hosted runners do
  # not carry. The net48 target compiles offline against the AutoCAD.NET /
  # Civil3D2024.Base NuGet API stubs, so we compile that target here to prove the
  # plugin code is sound. A self-hosted runner with Civil 3D installed can build
  # the net8 target via scripts/ci.ps1 (see that script and setup docs).
  plugin:
    name: Civil 3D plugin (net48 offline compile)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build plugin (net48 via NuGet API stubs)
        shell: pwsh
        run: >
          dotnet build src/HydroComplete.Civil3D/HydroComplete.Civil3D.csproj
          -c Release -p:BuildNet48=true -f net48
