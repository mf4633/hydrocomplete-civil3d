<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>HydroComplete — Model Builder</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #0d1117; font-family: 'Segoe UI', Arial, sans-serif; color: #c9d1d9; }

/* ── Layout ──────────────────────────────────────────────────────── */
#app { display: flex; flex-direction: column; height: 100%; }

/* ── Toolbar ─────────────────────────────────────────────────────── */
#toolbar {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 10px; background: #161b22;
  border-bottom: 1px solid #30363d; flex-shrink: 0;
}
#toolbar h1 { font-size: 13px; color: #c9d1d9; font-weight: 700; margin-right: 6px; white-space: nowrap; }
.tbtn {
  padding: 3px 10px; font-size: 11px; font-weight: 600; border-radius: 4px;
  border: 1px solid #30363d; cursor: pointer; color: #c9d1d9;
  background: #21262d; white-space: nowrap;
}
.tbtn:hover { background: #30363d; }
.tbtn.primary { background: #1f6feb; border-color: #1f6feb; color: #fff; }
.tbtn.primary:hover { background: #388bfd; }
.tbtn.run { background: #238636; border-color: #238636; color: #fff; font-size: 12px; }
.tbtn.run:hover { background: #2ea043; }
.tbtn.danger { background: #da3633; border-color: #da3633; color: #fff; }
.sep { width: 1px; height: 20px; background: #30363d; }
#status { font-size: 10px; color: #8b949e; margin-left: auto; white-space: nowrap; }

/* ── Main ────────────────────────────────────────────────────────── */
#main { display: flex; flex: 1; overflow: hidden; }

/* ── Palette ─────────────────────────────────────────────────────── */
#palette-wrap {
  width: 185px; flex-shrink: 0; display: flex; flex-direction: column;
  background: #161b22; border-right: 1px solid #30363d;
  user-select: none;
}
#palette-search-wrap { padding: 5px 6px; border-bottom: 1px solid #30363d; flex-shrink: 0; }
#palette-search {
  width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 4px;
  color: #c9d1d9; font-size: 10px; padding: 3px 6px;
}
#palette-search:focus { outline: none; border-color: #1f6feb; }
#palette {
  flex: 1; overflow-y: auto; padding: 4px 0;
}
.cat-hdr {
  padding: 6px 8px 3px; font-size: 9px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .07em; color: #8b949e;
}
.pnode {
  margin: 2px 6px; padding: 6px 8px; border-radius: 5px; cursor: grab;
  border-left: 3px solid transparent; background: #21262d; font-size: 11px;
  font-weight: 600; transition: background .1s;
}
.pnode:hover { background: #30363d; }
.pnode .desc { font-size: 9px; font-weight: 400; color: #8b949e; margin-top: 1px; }

/* ── Canvas wrap ─────────────────────────────────────────────────── */
#canvas-wrap { flex: 1; position: relative; overflow: hidden; min-width: 0; }
#dag-canvas { display: block; width: 100%; height: 100%; cursor: default; outline: none; }

/* ── Config panel ────────────────────────────────────────────────── */
#config-panel {
  width: 220px; flex-shrink: 0; display: none;
  background: #161b22; border-left: 1px solid #30363d;
  overflow-y: auto; padding: 0;
}
#config-panel.open { display: flex; flex-direction: column; }
#config-header {
  padding: 8px 10px 6px; border-bottom: 1px solid #30363d;
  display: flex; align-items: center; justify-content: space-between;
}
#config-title { font-size: 12px; font-weight: 700; }
#config-close { cursor: pointer; color: #8b949e; font-size: 16px; line-height: 1; }
#config-close:hover { color: #c9d1d9; }
#config-body { padding: 8px 10px; flex: 1; overflow-y: auto; }
.field-group { margin-bottom: 10px; }
.field-group label { display: block; font-size: 10px; color: #8b949e; margin-bottom: 2px; }
.field-group input, .field-group select {
  width: 100%; padding: 4px 6px; background: #0d1117;
  border: 1px solid #30363d; border-radius: 4px;
  color: #c9d1d9; font-size: 11px;
}
.field-group input:focus, .field-group select:focus {
  outline: none; border-color: #1f6feb;
}
.field-unit { font-size: 9px; color: #8b949e; margin-top: 1px; }
#config-run { margin: 8px 0; width: 100%; }

/* ── Results strip ───────────────────────────────────────────────── */
#results-bar {
  display: none; padding: 4px 10px;
  background: #0a3622; border-top: 1px solid #238636;
  font-size: 10px; color: #56d364; flex-shrink: 0;
  white-space: nowrap; overflow-x: auto;
}
#results-bar.open { display: block; }

/* ── Chart tab ───────────────────────────────────────────────────── */
#chart-tab {
  display: none; padding: 0;
  flex-direction: column;
}
#chart-tab.open { display: flex; }
#chart-canvas-el {
  width: 100%; flex: 1; display: block; background: #0d1117;
}

/* ── Config panel tabs ───────────────────────────────────────────── */
.tab-btn {
  font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 3px;
  cursor: pointer; color: #8b949e; border: 1px solid transparent;
}
.tab-btn.active { color: #c9d1d9; border-color: #30363d; background: #21262d; }
.tab-btn:hover:not(.active) { color: #c9d1d9; }
#config-panel { flex-direction: column; }
#config-header { display: flex; align-items: center; gap: 4px; padding: 5px 8px; border-bottom: 1px solid #30363d; flex-shrink: 0; }

/* ── Minimap ─────────────────────────────────────────────────────── */
#minimap-canvas {
  position: absolute; bottom: 40px; right: 10px;
  width: 140px; height: 90px; border: 1px solid #30363d;
  border-radius: 4px; background: #161b22; cursor: default;
  pointer-events: none; opacity: 0.85;
}

/* ── Zoom controls ───────────────────────────────────────────────── */
#zoom-ctrl {
  position: absolute; bottom: 10px; right: 10px;
  display: flex; gap: 3px;
}
.zcbtn {
  width: 26px; height: 26px; font-size: 15px; font-weight: 700;
  background: #21262d; border: 1px solid #30363d; color: #c9d1d9;
  border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.zcbtn:hover { background: #30363d; }

/* ── Help hint ───────────────────────────────────────────────────── */
#help {
  position: absolute; bottom: 10px; left: 6px;
  font-size: 9px; color: #30363d; pointer-events: none;
}
</style>
</head>
<body>
<div id="app">

  <!-- Toolbar -->
  <div id="toolbar">
    <h1>HC Model Builder</h1>
    <div class="sep"></div>
    <button class="tbtn" id="btn-new">New</button>
    <button class="tbtn" id="btn-save">Save</button>
    <button class="tbtn" id="btn-load">Load</button>
    <button class="tbtn" id="btn-report" title="Export results as HTML report">Report</button>
    <div class="sep"></div>
    <button class="tbtn run" id="btn-run">▶ Run</button>
    <button class="tbtn danger" id="btn-del">Delete</button>
    <div class="sep"></div>
    <button class="tbtn" id="btn-undo" title="Ctrl+Z" disabled>↩</button>
    <button class="tbtn" id="btn-redo" title="Ctrl+Y" disabled>↪</button>
    <button class="tbtn" id="btn-layout" title="Auto-layout nodes (Ctrl+L)">⊞ Layout</button>
    <button class="tbtn" id="btn-fit"    title="Fit all nodes in view (Ctrl+A)">⊡ Fit</button>
    <div class="sep"></div>
    <select id="tmpl-select" style="font-size:11px;background:#21262d;color:#c9d1d9;border:1px solid #30363d;border-radius:4px;padding:3px 6px;cursor:pointer">
      <option value="">Templates…</option>
    </select>
    <div class="sep"></div>
    <span id="status">Ready</span>
  </div>

  <!-- Main row -->
  <div id="main">

    <!-- Palette -->
    <div id="palette-wrap">
      <div id="palette-search-wrap">
        <input id="palette-search" type="text" placeholder="🔍 Filter nodes…" autocomplete="off"/>
      </div>
      <div id="palette"></div>
    </div>

    <!-- Canvas -->
    <div id="canvas-wrap">
      <canvas id="dag-canvas" tabindex="0"></canvas>
      <canvas id="minimap-canvas" width="140" height="90"></canvas>
      <div id="zoom-ctrl">
        <button class="zcbtn" id="btn-zi">+</button>
        <button class="zcbtn" id="btn-zr">⌂</button>
        <button class="zcbtn" id="btn-zo">−</button>
      </div>
      <div id="help">Drag from palette · Connect ports · Scroll=zoom · Mid-drag=pan · Del=remove · Click=inspect</div>
    </div>

    <!-- Config / inspector + chart panel -->
    <div id="config-panel">
      <div id="config-header">
        <div style="display:flex;gap:6px">
          <span class="tab-btn active" data-tab="config">Config</span>
          <span class="tab-btn" data-tab="chart">Chart</span>
        </div>
        <span id="config-title" style="font-size:10px;color:#8b949e;flex:1;text-align:center"></span>
        <span id="config-close">✕</span>
      </div>
      <div id="config-body" style="flex:1;overflow-y:auto;padding:8px 10px">
        <p style="font-size:10px;color:#8b949e">Select a node to configure.</p>
      </div>
      <div id="chart-tab">
        <canvas id="chart-canvas-el"></canvas>
      </div>
    </div>

  </div><!-- /main -->

  <!-- Results strip (shown after run) -->
  <div id="results-bar"></div>

</div><!-- /app -->

<script type="module">
import init, { DagEditor } from './pkg/hydrocomplete_dag.js';

await init();

// ── Canvas setup ──────────────────────────────────────────────────────────
const canvas  = document.getElementById('dag-canvas');
const wrap    = document.getElementById('canvas-wrap');
const status  = document.getElementById('status');
const cfgPanel = document.getElementById('config-panel');
const cfgBody  = document.getElementById('config-body');
const cfgTitle = document.getElementById('config-title');
const resultsBar = document.getElementById('results-bar');

function resizeCanvas() {
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  editor.resize();
}
new ResizeObserver(resizeCanvas).observe(wrap);
resizeCanvas();

const editor = new DagEditor('dag-canvas');

// ── Palette metadata from WASM ────────────────────────────────────────────
const PALETTE = JSON.parse(DagEditor.palette_json());
const NODE_SCHEMA = Object.fromEntries(PALETTE.map(n => [n.kind, n]));

const sidebar = document.getElementById('palette');
let currentCat = null;
for (const item of PALETTE) {
  if (item.category !== currentCat) {
    currentCat = item.category;
    const h = document.createElement('div');
    h.className = 'cat-hdr';
    h.textContent = item.category;
    sidebar.appendChild(h);
  }
  const el = document.createElement('div');
  el.className = 'pnode';
  el.style.borderLeftColor = item.header_fill;
  el.dataset.kind = item.kind;
  el.innerHTML = `<div>${item.label}</div><div class="desc">${item.description}</div>`;
  sidebar.appendChild(el);
}

// ── Config panel ──────────────────────────────────────────────────────────
let configNodeId = null;

function showConfig(nodeJson) {
  if (!nodeJson) { hideConfig(); return; }
  const node = JSON.parse(nodeJson);
  configNodeId = node.id['0'];
  const schema = NODE_SCHEMA[node.kind];
  if (!schema) { hideConfig(); return; }

  cfgTitle.textContent = schema.label;
  cfgBody.innerHTML = '';

  if (!schema.config_fields || schema.config_fields.length === 0) {
    cfgBody.innerHTML = '<p style="font-size:10px;color:#8b949e">No parameters.</p>';
  } else {
    for (const f of schema.config_fields) {
      const group = document.createElement('div');
      group.className = 'field-group';
      const label = document.createElement('label');
      label.textContent = f.label;
      group.appendChild(label);

      let input;
      if (f.field_type === 'select') {
        input = document.createElement('select');
        for (const opt of f.options) {
          const o = document.createElement('option');
          o.value = opt.value; o.textContent = opt.label;
          input.appendChild(o);
        }
        const cur = (node.config && node.config[f.key]) ?? f.default_str;
        input.value = cur;
      } else {
        input = document.createElement('input');
        input.type = f.field_type === 'number' ? 'number' : 'text';
        input.step = 'any';
        const cur = (node.config && node.config[f.key] !== undefined) ? node.config[f.key] : f.default_num;
        input.value = cur;
      }

      input.dataset.key = f.key;
      input.dataset.type = f.field_type;
      input.addEventListener('change', () => flushConfig());
      group.appendChild(input);

      if (f.unit) {
        const u = document.createElement('div');
        u.className = 'field-unit'; u.textContent = f.unit;
        group.appendChild(u);
      }
      cfgBody.appendChild(group);
    }
  }

  // Show output values if present
  if (node.outputs && Object.keys(node.outputs).length > 0) {
    const sep = document.createElement('hr');
    sep.style.cssText = 'border:none;border-top:1px solid #30363d;margin:8px 0';
    cfgBody.appendChild(sep);
    const h = document.createElement('div');
    h.style.cssText = 'font-size:10px;font-weight:700;color:#56d364;margin-bottom:6px';
    h.textContent = 'Results';
    cfgBody.appendChild(h);
    for (const [k, v] of Object.entries(node.outputs)) {
      if (k === 'steps') continue;
      const row = document.createElement('div');
      row.style.cssText = 'font-size:10px;display:flex;justify-content:space-between;margin-bottom:3px';
      const portName = getPortName(schema, k);
      row.innerHTML = `<span style="color:#8b949e">${portName}</span><span style="color:#c9d1d9;font-weight:600">${fmtVal(v)}</span>`;
      cfgBody.appendChild(row);
    }
    if (node.outputs.steps) {
      const s = document.createElement('div');
      s.style.cssText = 'font-size:9px;color:#484f58;margin-top:6px;word-break:break-all';
      s.textContent = node.outputs.steps;
      cfgBody.appendChild(s);
    }
  }

  cfgPanel.classList.add('open');
  if (activeTab === 'chart') refreshChart();
}

function getPortName(schema, key) {
  const idx = parseInt(key);
  if (!isNaN(idx) && schema.n_outputs > idx) {
    // Use port label from WASM palette_json — we don't have port names here
    // Fallback to "Output N"
    return `Output ${idx + 1}`;
  }
  return key;
}

function fmtVal(v) {
  if (typeof v === 'number') return v.toFixed(Math.abs(v) >= 100 ? 1 : 3);
  if (typeof v === 'boolean') return v ? 'Yes' : 'No';
  if (typeof v === 'object') return JSON.stringify(v).substring(0, 30);
  return String(v).substring(0, 30);
}

function hideConfig() {
  cfgPanel.classList.remove('open');
  configNodeId = null;
}

function flushConfig() {
  if (configNodeId === null) return;
  const config = {};
  cfgBody.querySelectorAll('[data-key]').forEach(el => {
    const key = el.dataset.key;
    const type = el.dataset.type;
    config[key] = type === 'number' ? parseFloat(el.value) : el.value;
  });
  editor.set_node_config(configNodeId, JSON.stringify(config));
}

document.getElementById('config-close').addEventListener('click', hideConfig);

// ── Palette search ────────────────────────────────────────────────────────────
const paletteSearch = document.getElementById('palette-search');
paletteSearch.addEventListener('input', () => {
  const q = paletteSearch.value.toLowerCase().trim();
  document.querySelectorAll('.pnode').forEach(el => {
    const s = NODE_SCHEMA[el.dataset.kind];
    const match = !q ||
      el.textContent.toLowerCase().includes(q) ||
      s?.category.toLowerCase().includes(q);
    el.style.display = match ? '' : 'none';
  });
  document.querySelectorAll('.cat-hdr').forEach(hdr => {
    let sib = hdr.nextElementSibling;
    let any = false;
    while (sib && !sib.classList.contains('cat-hdr')) {
      if (sib.style.display !== 'none') any = true;
      sib = sib.nextElementSibling;
    }
    hdr.style.display = any ? '' : 'none';
  });
});
// Clear search on Escape
paletteSearch.addEventListener('keydown', e => {
  if (e.key === 'Escape') { paletteSearch.value = ''; paletteSearch.dispatchEvent(new Event('input')); }
});

// ── Minimap ───────────────────────────────────────────────────────────────────
const minimapCanvas = document.getElementById('minimap-canvas');
function refreshMinimap() {
  editor.render_minimap('minimap-canvas', canvas.width, canvas.height);
}

// ── Tab switching ─────────────────────────────────────────────────────────────
const chartTab = document.getElementById('chart-tab');
const chartCanvas = document.getElementById('chart-canvas-el');
let activeTab = 'config';

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeTab = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
    const isChart = activeTab === 'chart';
    cfgBody.style.display   = isChart ? 'none' : '';
    chartTab.classList.toggle('open', isChart);
    if (isChart) refreshChart();
  });
});

function refreshChart() {
  if (configNodeId === null) return;
  const panelH = cfgPanel.clientHeight - 40;
  chartCanvas.width  = cfgPanel.clientWidth;
  chartCanvas.height = Math.max(panelH, 200);
  editor.render_chart(configNodeId, 'chart-canvas-el');
}

// ── Palette drag ──────────────────────────────────────────────────────────
let palDragging = false, palKind = null;

sidebar.addEventListener('mousedown', e => {
  const nd = e.target.closest('.pnode');
  if (!nd) return;
  palDragging = true; palKind = nd.dataset.kind;
  editor.palette_drag_start(palKind);
  const r = canvas.getBoundingClientRect();
  editor.palette_drag_move(e.clientX - r.left, e.clientY - r.top);
});

// ── Canvas events ─────────────────────────────────────────────────────────
canvas.addEventListener('mousedown', e => {
  if (palDragging) return;
  editor.mouse_down(e.offsetX, e.offsetY, e.button);
  e.preventDefault();

  // Show config panel for selected node after click
  setTimeout(() => {
    const j = editor.get_selected_node_json();
    if (j) showConfig(j); else hideConfig();
  }, 0);
});

canvas.addEventListener('contextmenu', e => e.preventDefault());

window.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  const sx = e.clientX - r.left, sy = e.clientY - r.top;
  if (palDragging) { editor.palette_drag_move(sx, sy); }
  else             { editor.mouse_move(sx, sy); refreshMinimap(); }
});

window.addEventListener('mouseup', e => {
  const r  = canvas.getBoundingClientRect();
  const sx = e.clientX - r.left, sy = e.clientY - r.top;
  const onCanvas = sx >= 0 && sy >= 0 && sx <= canvas.width && sy <= canvas.height;
  if (palDragging) {
    if (onCanvas) {
      editor.palette_drop(sx, sy);
      updateUndoRedo();
      setStatus(`Added ${NODE_SCHEMA[palKind]?.label ?? palKind}`);
      setTimeout(() => {
        const j = editor.get_selected_node_json();
        if (j) showConfig(j);
      }, 0);
    } else {
      editor.palette_cancel();
    }
    palDragging = false; palKind = null;
  } else {
    editor.mouse_up(sx, sy);
  }
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  editor.wheel(e.deltaY, e.offsetX, e.offsetY);
  refreshMinimap();
}, { passive: false });

window.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
    e.preventDefault();
    if (editor.undo()) { hideConfig(); updateUndoRedo(); refreshMinimap(); setStatus('Undo'); }
    return;
  }
  if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.shiftKey && e.key === 'z'))) {
    e.preventDefault();
    if (editor.redo()) { hideConfig(); updateUndoRedo(); refreshMinimap(); setStatus('Redo'); }
    return;
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c') {
    e.preventDefault();
    if (editor.copy_selected()) setStatus('Copied');
    return;
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v') {
    e.preventDefault();
    if (editor.paste()) { updateUndoRedo(); refreshMinimap(); setStatus('Pasted'); }
    return;
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'd') {
    e.preventDefault();
    editor.copy_selected();
    if (editor.paste()) { updateUndoRedo(); refreshMinimap(); setStatus('Duplicated'); }
    return;
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'l') {
    e.preventDefault();
    editor.layout(); updateUndoRedo(); refreshMinimap(); setStatus('Layout applied');
    return;
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'a') {
    e.preventDefault();
    editor.zoom_fit(); refreshMinimap(); setStatus('Fit to view');
    return;
  }
  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (editor.key_down(e.key)) {
      hideConfig(); updateUndoRedo();
      e.preventDefault();
      setStatus('Deleted');
    }
  }
  if (e.key === 'Escape') hideConfig();
});

// ── Toolbar ───────────────────────────────────────────────────────────────
document.getElementById('btn-new').addEventListener('click', () => {
  if (confirm('Clear diagram?')) { editor.clear(); hideConfig(); updateUndoRedo(); setStatus('Cleared'); }
});

document.getElementById('btn-save').addEventListener('click', () => {
  const blob = new Blob([editor.to_json()], { type: 'application/json' });
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(blob), download: 'hc-model.json',
  });
  a.click(); URL.revokeObjectURL(a.href);
  setStatus('Saved');
});

document.getElementById('btn-load').addEventListener('click', () => {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.json';
  inp.onchange = async e => {
    const text = await e.target.files[0].text();
    if (editor.from_json(text)) { hideConfig(); setStatus('Loaded'); }
    else setStatus('Load failed — invalid JSON');
  };
  inp.click();
});

document.getElementById('btn-del').addEventListener('click', () => {
  if (editor.key_down('Delete')) { hideConfig(); setStatus('Deleted'); }
});

document.getElementById('btn-run').addEventListener('click', () => {
  flushConfig();
  const dagJson   = editor.to_json();
  const orderJson = editor.execution_order_json();
  const dag   = JSON.parse(dagJson);
  const order = JSON.parse(orderJson);

  if (window.chrome?.webview) {
    // Civil 3D WebView2 host
    window.chrome.webview.postMessage(JSON.stringify({ type: 'HC_RUN', dag, order }));
    setStatus('Running model in Civil 3D…');
  } else if (window.parent !== window) {
    // Embedded iframe host
    window.parent.postMessage({ type: 'HC_RUN', dag, order }, '*');
    setStatus('Running model…');
  } else {
    // Standalone browser — use the JS fallback engine
    setStatus('Running (standalone mode)…');
    try {
      const resultJson = runStandaloneEngine(dagJson, orderJson);
      if (editor.apply_results_json(resultJson)) {
        const j = editor.get_selected_node_json();
        if (j) showConfig(j);
        showResultsBar(JSON.parse(resultJson));
        setStatus('Results applied (standalone — limited engines)');
      }
    } catch(e) {
      setStatus(`Standalone run error: ${e}`);
    }
  }
});

document.getElementById('btn-zi').addEventListener('click', () => { editor.zoom_in(); refreshMinimap(); });
document.getElementById('btn-zo').addEventListener('click', () => { editor.zoom_out(); refreshMinimap(); });

// ── Undo / Redo ───────────────────────────────────────────────────────────────
const btnUndo = document.getElementById('btn-undo');
const btnRedo = document.getElementById('btn-redo');

function updateUndoRedo() {
  btnUndo.disabled = !editor.can_undo();
  btnRedo.disabled = !editor.can_redo();
  btnUndo.style.opacity = editor.can_undo() ? '1' : '0.4';
  btnRedo.style.opacity = editor.can_redo() ? '1' : '0.4';
}

btnUndo.addEventListener('click', () => { if (editor.undo()) { hideConfig(); updateUndoRedo(); setStatus('Undo'); } });
btnRedo.addEventListener('click', () => { if (editor.redo()) { hideConfig(); updateUndoRedo(); setStatus('Redo'); } });

const catalog = JSON.parse(DagEditor.template_catalog_json());
for (const t of catalog) {

  opt.value = t.id;
  opt.title = t.description;
  opt.textContent = t.label;

}

  const id = tmplSelect.value;

  if (editor.load_template(id)) {

// ── Report generation ─────────────────────────────────────────────────────────
document.getElementById('btn-report').addEventListener('click', generateReport);

function generateReport() {
  const dagJson = editor.to_json();
  const dag     = JSON.parse(dagJson);
  const order   = JSON.parse(editor.execution_order_json());
  const hasResults = dag.nodes.some(n => Object.keys(n.outputs || {}).length > 0);

  // Capture canvas as PNG for embedding
  const canvasImg = canvas.toDataURL('image/png', 0.85);

  const now = new Date().toLocaleString();
  const nodeRows = order.map(id => {
    const node = dag.nodes.find(n => n.id[0] === id);
    if (!node) return '';
    const schema = NODE_SCHEMA[node.kind];
    const label  = schema?.label ?? node.kind;
    const userLbl = node.label ? ` — ${node.label}` : '';
    const cfg    = node.config || {};
    const outs   = node.outputs || {};

    const configRows = Object.entries(cfg).map(([k, v]) => {
      const field = schema?.config_fields?.find(f => f.key === k);
      const lbl   = field?.label ?? k;
      const unit  = field?.unit ?? '';
      return `<tr><td class="k">${lbl}</td><td>${v}${unit ? ' ' + unit : ''}</td></tr>`;
    }).join('');

    const outRows = Object.entries(outs).filter(([k]) => k !== 'steps').map(([k, v]) => {
      const pIdx = parseInt(k);
      const portName = !isNaN(pIdx) && schema ? `Output ${pIdx + 1}` : k;
      const val = typeof v === 'object' ? JSON.stringify(v).substring(0, 60) : String(v).substring(0, 60);
      return `<tr class="out"><td class="k">${portName}</td><td><strong>${val}</strong></td></tr>`;
    }).join('');

    const stepsHtml = outs.steps
      ? `<p class="steps">${String(outs.steps).replace(/;/g, ';<br>')}</p>` : '';

    return `<div class="node-block">
      <h3>${label}${userLbl}</h3>
      ${configRows || outRows ? `<table class="param-table">
        ${configRows ? `<thead><tr><th colspan="2">Parameters</th></tr></thead><tbody>${configRows}</tbody>` : ''}
        ${outRows ? `<thead><tr><th colspan="2">Results</th></tr></thead><tbody>${outRows}</tbody>` : ''}
      </table>` : ''}
      ${stepsHtml}
    </div>`;
  }).join('');

  const html = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>HydroComplete DAG Analysis Report</title>
<style>
  body { font-family: 'Segoe UI', Arial, sans-serif; max-width: 860px; margin: 40px auto; color: #1a1a2e; font-size: 13px; }
  h1 { font-size: 20px; border-bottom: 2px solid #1976d2; padding-bottom: 6px; color: #1565c0; }
  h2 { font-size: 15px; margin: 28px 0 8px; color: #1976d2; }
  h3 { font-size: 13px; margin: 0 0 6px; background: #e3f2fd; padding: 4px 8px; border-left: 3px solid #1976d2; }
  .node-block { margin: 14px 0; border: 1px solid #e0e6ed; border-radius: 6px; overflow: hidden; }
  table.param-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  table.param-table td, table.param-table th { border: 1px solid #e0e6ed; padding: 4px 8px; }
  table.param-table th { background: #f5f7fa; font-weight: 600; font-size: 11px; }
  td.k { color: #546e7a; width: 45%; }
  tr.out td { background: #f0fdf4; }
  tr.out td strong { color: #1b5e20; }
  .steps { font-size: 10px; color: #78909c; background: #fafbfc; padding: 6px 8px; margin: 0; font-family: monospace; }
  .diagram { margin: 16px 0; text-align: center; }
  .diagram img { max-width: 100%; border: 1px solid #e0e6ed; border-radius: 4px; }
  .disclaimer { margin: 32px 0 0; padding: 10px 14px; background: #fff8e6; border: 1px solid #e6c200; font-size: 11px; }
  .meta { color: #78909c; font-size: 11px; margin-bottom: 20px; }
</style>
</head>
<body>
<h1>HydroComplete — Stormwater Analysis Report</h1>
<p class="meta">Generated: ${now} &nbsp;|&nbsp; Nodes: ${dag.nodes.length} &nbsp;|&nbsp; Edges: ${dag.edges.length}</p>

<h2>Model Diagram</h2>
<div class="diagram"><img src="${canvasImg}" alt="DAG diagram"/></div>

<h2>Calculation Results</h2>
${hasResults ? nodeRows : '<p><em>No results yet — press ▶ Run first.</em></p>'}

<div class="disclaimer">
<strong>Disclaimer:</strong> This report is generated by HydroComplete for preliminary
stormwater analysis. Verify all inputs, outputs, and assumptions against the engineer's
design basis and applicable jurisdiction standards. Not a substitute for licensed
professional engineering judgment.

  const blob = new Blob([html], { type: 'text/html' });
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(blob),
    download: `hc-dag-report-${new Date().toISOString().slice(0,10)}.html`,

  a.click();
  URL.revokeObjectURL(a.href);

// ── Standalone JS engine (runs without Civil 3D host) ────────────────────────
// Implements the same node calculations as DagExecutor.cs in JavaScript.
// Only used when no WebView2 host is detected on ▶ Run.

function runStandaloneEngine(dagJson, orderJson) {
  const dag   = JSON.parse(dagJson);
  const order = JSON.parse(orderJson);

  const nodeById = Object.fromEntries(dag.nodes.map(n => [n.id[0], n]));
  const edgeMap  = {};
  for (const e of dag.edges) {
    edgeMap[`${e.to_node[0]},${e.to_port}`] = [e.from_node[0], e.from_port];
  }

  function getOutput(nodeId, port) {
    const n = nodeById[nodeId];
    return n?.outputs?.[String(port)] ?? 0;
  }
  function input(nodeId, port, fallback = 0) {
    const key = `${nodeId},${port}`;
    if (edgeMap[key]) {
      const [fn, fp] = edgeMap[key];
      const v = getOutput(fn, fp);
      return typeof v === 'number' ? v : fallback;
    }
    return fallback;
  }
  function cfg(node, key, fallback) {
    const v = node.config?.[key];
    return v !== undefined ? Number(v) : fallback;
  }
  function cfgStr(node, key, fallback) {
    return node.config?.[key] ?? fallback;
  }

  for (const nodeId of order) {
    const node = nodeById[nodeId];
    if (!node) continue;
    const kind = node.kind;
    const outs = {};
    try {
      switch(kind) {
        case 'catchment':
          outs['0'] = cfg(node, 'area_acres', 5);
          outs['1'] = cfg(node, 'curve_number', 75);
          break;
        case 'rainfall_event':
          outs['0'] = cfg(node, 'depth_in', 3.5);
          break;
        case 'rational_method': {
          const A = input(nodeId, 0, cfg(node, 'area_acres', 5));
          const C = cfg(node, 'runoff_c', 0.7);
          const i = cfg(node, 'intensity_in_hr', 2.5);
          outs['0'] = C * i * A;
          outs['steps'] = `Q = ${C}×${i}×${A.toFixed(2)} = ${outs['0'].toFixed(2)} cfs`;
          break;
        }
        case 'scs_runoff': {
          const CN  = input(nodeId, 0, cfg(node, 'curve_number', 75));
          const P   = input(nodeId, 1, cfg(node, 'rainfall_in', 3.5));
          const area = cfg(node, 'area_acres', 5);
          const S = 1000/CN - 10; const Ia = 0.2*S;
          const Q = P > Ia ? Math.pow(P-Ia,2)/(P-Ia+S) : 0;
          outs['0'] = +Q.toFixed(4);
          outs['volume_cf'] = +(Q * area * 43560 / 12).toFixed(0);
          outs['steps'] = `CN=${CN}, S=${S.toFixed(2)}, Ia=${Ia.toFixed(2)}, Q=${Q.toFixed(3)} in`;
          break;
        }
        case 'manning_pipe': {
          const D = cfg(node,'diameter_ft',1.5);
          const S = cfg(node,'slope',0.005);
          const n = cfg(node,'manning_n',0.013);
          const A = Math.PI*D*D/4; const R = D/4;
          const Qfull = (1.486/n)*A*Math.pow(R,2/3)*Math.pow(S,0.5);
          const Qdes = input(nodeId, 0, cfg(node,'design_q_cfs',5));
          const ratio = Qfull > 0 ? Qdes/Qfull : 0;
          outs['0'] = +Qfull.toFixed(3);
          outs['q_ratio'] = +ratio.toFixed(3);
          outs['surcharged'] = ratio > 1 ? 1 : 0;
          outs['steps'] = `Qfull=${Qfull.toFixed(2)} cfs, Q/Qfull=${ratio.toFixed(2)}`;
          break;
        }
        case 'water_quality_volume': {
          const area  = input(nodeId, 0, cfg(node,'area_acres',5));
          const I     = cfg(node,'impervious_pct',50)/100;
          const P     = input(nodeId, 1, cfg(node,'design_storm_in',1));
          const Rv    = 0.05 + 0.009*I*100;
          const WQV   = Rv * P * area * 43560 / 12;
          outs['0'] = +WQV.toFixed(0);
          outs['rv'] = +Rv.toFixed(3);
          outs['steps'] = `Rv=${Rv.toFixed(3)}, WQV=${WQV.toFixed(0)} cf`;
          break;
        }
        case 'rusle_erosion': {
          const R_fac = cfg(node,'r_factor',180);
          const K     = cfg(node,'k_factor',0.28);
          const LS_val= cfg(node,'ls_factor',1.5);
          const C_fac = cfg(node,'c_factor',0.20);
          const P_fac = cfg(node,'p_factor',1.0);
          const area  = cfg(node,'area_acres',1);
          const A_val = R_fac * K * LS_val * C_fac * P_fac;
          outs['0'] = +A_val.toFixed(3);
          outs['total_tons_yr'] = +(A_val * area).toFixed(2);
          outs['steps'] = `A=${A_val.toFixed(2)} t/ac/yr`;
          break;
        }
        case 'treatment_bmp':
        case 'treatment_train': {
          // Simplified removal using BMP library defaults
          const BMP_ETA = {'bioretention':[0.85,0.45,0.60],'wet-pond':[0.80,0.40,0.50],
                           'constructed-wetland':[0.85,0.35,0.45],'vegetated-swale':[0.65,0.35,0.40],
                           'sand-filter':[0.85,0.35,0.50]};
          const chain = kind === 'treatment_train'
            ? cfgStr(node,'bmp_chain','bioretention').split(',')
            : [cfgStr(node,'bmp_type','bioretention')];
          // compute influent from area + runoff
          const area = cfg(node,'area_acres',5);
          const runoff = input(nodeId, 0, cfg(node,'runoff_in',0.5));
          const vol  = runoff * area * 43560 / 12;
          const conc = [100, 2.0, 0.35]; // TSS mg/L, TN, TP
          let eff    = conc.map(c => c * vol * 7.48 * 8.34 / 1e6);
          for (const bmp of chain) {
            const eta = BMP_ETA[bmp.trim()] || [0.5,0.3,0.35];
            eff = eff.map((e,i) => e*(1-eta[i]));
          }
          outs['1'] = +((1-eff[0]/(conc[0]*vol*7.48*8.34/1e6))*100).toFixed(1);
          outs['tss_out_lbs'] = +eff[0].toFixed(3);
          outs['tn_out_lbs']  = +eff[1].toFixed(3);
          outs['tp_out_lbs']  = +eff[2].toFixed(3);
          outs['tss_in_lbs']  = +(conc[0]*vol*7.48*8.34/1e6).toFixed(3);
          outs['tn_in_lbs']   = +(conc[1]*vol*7.48*8.34/1e6).toFixed(3);
          outs['tp_in_lbs']   = +(conc[2]*vol*7.48*8.34/1e6).toFixed(3);
          outs['steps'] = `Chain: ${chain.join('→')}, TSS η=${outs['1']}%`;
          break;
        }
        case 'bmp_sizing': {
          const area  = input(nodeId, 0, cfg(node,'area_acres',5));
          const I     = cfg(node,'impervious_pct',50)/100;
          const P     = cfg(node,'design_storm_in',1);
          const Rv    = 0.05 + 0.009*I*100;
          const WQV   = Rv * P * area * 43560 / 12;
          // Bioretention: 5% of drainage area is typical
          outs['0'] = +(area * 43560 * 0.05).toFixed(0);
          outs['steps'] = `WQV=${WQV.toFixed(0)} cf, BMP area ≈ 5% of site`;
          break;
        }
        case 'detention_pond': {
          // Simplified: SCS triangular hydrograph + prismatic pond
          const area  = cfg(node,'area_acres',5);
          const CN    = cfg(node,'curve_number',80);
          const P     = cfg(node,'rainfall_in',4.2);
          const tc    = cfg(node,'tc_min',20)/60; // hours
          const S = 1000/CN - 10; const Ia = 0.2*S;
          const Q = P > Ia ? Math.pow(P-Ia,2)/(P-Ia+S) : 0;
          const qp = (484 * area * Q) / (2.67 * tc + tc); // SCS triangular peak
          const bArea = cfg(node,'bottom_area_sf',5000);
          const zSlope = cfg(node,'side_slope',3);
          const maxD = cfg(node,'max_depth_ft',6);
          const oDia = cfg(node,'orifice_dia_in',6) / 12; // ft
          const vol = (bArea + (bArea + 2*zSlope*maxD) * (2*zSlope*maxD/bArea)) * maxD / 3;
          // Approximate attenuation: 30-60% for typical pond
          const atten = Math.min(60, 30 + 10*(maxD/qp));
          const qPeakOut = qp * (1 - atten/100);
          outs['0'] = +qPeakOut.toFixed(2);
          outs['1'] = +vol.toFixed(0);
          outs['attenuation_pct'] = +atten.toFixed(1);
          outs['steps'] = `Qp_in=${qp.toFixed(2)} cfs, Vol≈${vol.toFixed(0)} cf, atten≈${atten.toFixed(0)}%`;
          break;
        }
        case 'continuous_sim': {
          const area = input(nodeId, 0, cfg(node,'area_acres',5));
          const CN   = cfg(node,'curve_number',75);
          const yrs  = cfg(node,'years',3);
          // Approximate annual runoff using monthly average from Charlotte data
          const ANNUAL_RAIN_IN = 43.0; // Charlotte average
          const S = 1000/CN - 10; const Ia = 0.2*S;
          const annQ = ANNUAL_RAIN_IN > Ia ? Math.pow(ANNUAL_RAIN_IN-Ia,2)/(ANNUAL_RAIN_IN-Ia+S) : 0;
          const annRun = annQ * area * 43560/12; // ac-in/yr
          const tss = annRun * 7.48 * 8.34 * 100e-6; // rough EMC 100mg/L
          outs['0'] = +(annQ).toFixed(2);
          outs['tss_lbs_yr'] = +tss.toFixed(1);
          outs['steps'] = `Annual Q≈${annQ.toFixed(2)} in, Runoff≈${annRun.toFixed(0)} cf/yr`;
          break;
        }
        case 'manning_channel': {
          const b  = cfg(node,'bottom_width_ft',4);
          const z  = cfg(node,'side_slope',3);
          const S  = cfg(node,'slope',0.01);
          const n  = cfg(node,'manning_n',0.035);
          const Q  = input(nodeId, 0, cfg(node,'design_q_cfs',5));
          // Normal depth by bisection
          let ylo = 0.01, yhi = 20.0;
          for (let i = 0; i < 40; i++) {
            const ym = (ylo+yhi)/2;
            const A = (b + z*ym)*ym;
            const P = b + 2*ym*Math.sqrt(1+z*z);
            const R = A/P;
            const Qm = (1.486/n)*A*Math.pow(R,2/3)*Math.pow(S,0.5);
            if (Qm < Q) ylo = ym; else yhi = ym;
          }
          const y  = (ylo+yhi)/2;
          const A  = (b + z*y)*y;
          const v  = Q/A;
          outs['0'] = +y.toFixed(3);
          outs['1'] = +v.toFixed(3);
          outs['steps'] = `y=${y.toFixed(3)} ft, V=${v.toFixed(2)} fps`;
          break;
        }
        case 'sediment_basin': {
          const Q = input(nodeId, 0, cfg(node,'design_q_cfs',5));
          const SA = Q * 435; // NCDEQ 435 sf/cfs
          const vol = SA * 3.5; // 3.5 ft avg depth
          outs['0'] = 75.0; // ~75% trapping efficiency typical
          outs['1'] = +vol.toFixed(0);
          outs['surface_sf'] = +SA.toFixed(0);
          outs['steps'] = `SA=${SA.toFixed(0)} sf (435 sf/cfs), Vol≈${vol.toFixed(0)} cf`;
          break;
        }
        case 'rusle_erosion': {
          const R  = cfg(node,'r_factor',180);
          const K  = cfg(node,'k_factor',0.28);
          const LS = cfg(node,'ls_factor',1.5);
          const C  = cfg(node,'c_factor',0.20);
          const P  = cfg(node,'p_factor',1.0);
          const area = cfg(node,'area_acres',1);
          const A  = R*K*LS*C*P;
          outs['0'] = +A.toFixed(3);
          outs['total_tons_yr'] = +(A*area).toFixed(2);
          outs['steps'] = `R=${R}×K=${K}×LS=${LS}×C=${C}×P=${P}=${A.toFixed(2)} t/ac/yr`;
          break;
        }
        case 'time_of_concentration':
          outs['0'] = cfg(node,'tc_min',20);
          break;
        case 'unit_hydrograph': {
          const area = cfg(node,'area_acres',5);
          const tc   = input(nodeId, 1, cfg(node,'tc_min',20));
          const Q_in = input(nodeId, 0, 1.0);
          const qp   = (484 * area * Q_in) / (0.133 * tc + tc);
          outs['0'] = +qp.toFixed(2);
          outs['steps'] = `Qp = 484×${area}×${Q_in.toFixed(3)} / (0.133×${tc}+${tc}) = ${qp.toFixed(2)} cfs`;
          break;
        }
        case 'loss_method': {
          const P  = input(nodeId, 0, cfg(node,'rainfall_in',3.5));
          const CN = cfg(node,'curve_number',75);
          const S  = 1000/CN - 10; const Ia = 0.2*S;
          const Q  = P > Ia ? Math.pow(P-Ia,2)/(P-Ia+S) : 0;
          outs['0'] = +Q.toFixed(3);
          outs['loss_in'] = +(P-Q).toFixed(3);
          outs['steps']   = `P=${P}, CN=${CN}, Q=${Q.toFixed(3)} in`;
          break;
        }
        case 'water_quality_volume': {
          const area = input(nodeId, 0, cfg(node,'area_acres',5));
          const I    = cfg(node,'impervious_pct',50)/100;
          const P    = input(nodeId, 1, cfg(node,'design_storm_in',1));
          const Rv   = 0.05 + 0.009*I*100;
          const WQV  = Rv*P*area*43560/12;
          outs['0']  = +WQV.toFixed(0);
          outs['rv'] = +Rv.toFixed(3);
          outs['steps'] = `Rv=${Rv.toFixed(3)}, WQV=${WQV.toFixed(0)} cf`;
          break;
        }
        case 'outfall':
          outs['received'] = input(nodeId, 0, 0);
          break;
        default:
          outs['note'] = `${kind} — connect to Civil 3D for full calculation`;
      }
    } catch(e) { outs['error'] = String(e); }
    node.outputs = outs;
  }
  return JSON.stringify(dag);
}

// ── Receive results from C# ───────────────────────────────────────────────
window.addEventListener('message', e => {
  const msg = typeof e.data === 'string' ? JSON.parse(e.data) : e.data;
  if (!msg || msg.type !== 'HC_RESULT') return;
  const resultJson = typeof msg.dag === 'string' ? msg.dag : JSON.stringify(msg.dag);
  if (editor.apply_results_json(resultJson)) {
    setStatus('Results applied — click a node to see charts');
    refreshMinimap();
    const j = editor.get_selected_node_json();
    if (j) showConfig(j);
    showResultsBar(JSON.parse(resultJson));
  }
});

function showResultsBar(dag) {
  const summaries = (dag.nodes || [])
    .filter(n => n.outputs && n.outputs['0'] !== undefined)
    .map(n => {
      const schema = NODE_SCHEMA[n.kind];
      const label  = schema ? schema.label : n.kind;
      const val    = fmtVal(n.outputs['0']);
      const portLbl = schema && schema.n_outputs > 0 ? 'out' : '';
      return `${label}: ${val}`;
    });
  if (summaries.length > 0) {
    resultsBar.textContent = '▶ ' + summaries.join('  |  ');
    resultsBar.classList.add('open');
  }
}

function setStatus(s) { status.textContent = s; }
</script>
